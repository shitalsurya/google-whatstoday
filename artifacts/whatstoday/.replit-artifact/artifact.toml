kind = "mobile"
  previewPath = "/"
  title = "WhatsToday"
  version = "1.0.0"
  id = "artifacts/whatstoday"
  router = "expo-domain"

  [[integratedSkills]]
  name = "expo"
  version = "1.0.0"

  [[services]]
  ensurePreviewReachable = "/status"
  name = "expo"
  paths = [ "/" ]
  localPort = 19062

  [services.development]
  run = "bash -c 'cd /home/runner/workspace/artifacts/whatstoday && npm run dev'"

  [services.production]
  build = [ "bash", "-c", "cd /home/runner/workspace/artifacts/whatstoday && npm run build" ]
  run = [ "bash", "-c", "cd /home/runner/workspace/artifacts/whatstoday && npm run serve" ]

  [services.env]
  PORT = "19062"
  BASE_PATH = "/"
  